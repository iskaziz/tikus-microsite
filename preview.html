<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TIKUS Rush Preview</title>
  <link rel="stylesheet" href="css/game.css?v=arcade-v1">
  <style>
    html, body { min-height: 100%; margin: 0; background: #100a0b; color: #f0e4cf; font-family: Arial, sans-serif; }
    .preview { min-height: 100dvh; display: grid; place-items: center; padding: 1rem; }
    .preview button { min-height: 3rem; padding: .8rem 1.2rem; border: 2px solid #f0e4cf; background: #9d0d1d; color: #fff4df; font-weight: 900; text-transform: uppercase; cursor: pointer; }
  </style>
  <script>
    window.TIKUS_CONTENT = {
      scenes: {
        'sitting-room': {
          hotspots: [
            { id: 'main-sofa', x: 72, y: 68, title: 'Game' },
            { id: 'lamp', x: 20, y: 40, title: 'Lamp' },
            { id: 'radio', x: 45, y: 62, title: 'Radio' }
          ]
        }
      }
    };
    window.TikusMicrosite = {
      modal: {
        open(content, trigger) {
          console.log('Original modal opened', content, trigger);
        }
      }
    };
  </script>
  <script defer src="js/tikus-logic-game.js?v=arcade-v1"></script>
</head>
<body>
  <main class="preview">
    <button id="preview-open" type="button">Open Tikus Rush</button>
  </main>
  <script>
    const previewButton = document.getElementById('preview-open');
    previewButton.addEventListener('click', (event) => {
      window.TikusMicrosite.modal.open({ id: 'logic-game', type: 'game', gameId: 'tikus-rush' }, event.currentTarget);
    });
    if (new URLSearchParams(location.search).has('autostart')) {
      window.addEventListener('load', () => {
        setTimeout(() => {
          previewButton.click();
          setTimeout(() => document.querySelector('[data-arcade-start]')?.click(), 250);
        }, 250);
      });
    }
  </script>
</body>
</html>
